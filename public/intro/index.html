<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boxing Center Portet — Intro</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      #stage {
        position: fixed;
        inset: 0;
        background: #000;
        overflow: hidden;
      }

      #canvas {
        position: absolute;
        inset: 0;
        z-index: 20;
        pointer-events: none;
      }

      #stage.stage--ready #canvas {
        display: none;
        visibility: hidden;
        opacity: 0;
      }

      .gloves {
        position: absolute;
        inset: 0;
        z-index: 10;
        pointer-events: none;
      }

      #stage.stage--ready .gloves {
        visibility: hidden;
        opacity: 0;
        pointer-events: none;
      }

      .glove {
        position: absolute;
        top: 50%;
        left: 50%;
        width: min(82vw, 720px);
        max-width: none;
        user-select: none;
        will-change: transform, opacity;
        opacity: 0;
        visibility: hidden;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }

      #logo-overlay {
        position: absolute;
        inset: 0;
        z-index: 30;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      #logo-overlay img {
        width: min(88vw, 720px);
        height: auto;
        object-fit: contain;
        filter: drop-shadow(0 0 32px rgba(245, 245, 242, 0.35))
          drop-shadow(0 0 8px rgba(201, 162, 39, 0.25));
      }

      #enter-btn {
        position: absolute;
        bottom: 3rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        border: 1px solid rgba(245, 245, 242, 0.3);
        background: rgba(14, 26, 51, 0.85);
        color: #f5f5f2;
        font-family: system-ui, sans-serif;
        font-size: 0.9rem;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        padding: 0.75rem 2rem;
        border-radius: 2px;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s;
      }

      #enter-btn.visible {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        z-index: 100;
      }

      #enter-btn:hover {
        background: rgba(14, 26, 51, 1);
        border-color: rgba(245, 245, 242, 0.5);
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <canvas id="canvas" aria-hidden="true"></canvas>
      <div class="gloves">
        <img id="glove-left" class="glove" src="/intro/glove-right.png" alt="" draggable="false" />
        <img id="glove-right" class="glove" src="/intro/glove-left.png" alt="" draggable="false" />
      </div>
      <div id="logo-overlay">
        <img id="logo-img" src="/intro/logo-boxing-center.png" alt="Boxing Center" />
      </div>
      <button id="enter-btn" type="button">Entrer dans l'arène</button>
      <div id="boot-error" hidden style="position:absolute;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:2rem;background:rgba(0,0,0,0.92);color:#f5f5f2;font-family:system-ui,sans-serif;text-align:center;line-height:1.5"></div>
    </div>

    <script>
      (function () {
        var GSAP_CDNS = [
          "https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js",
          "https://unpkg.com/gsap@3.13.0/dist/gsap.min.js",
          "https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js",
        ];

        function loadScript(url) {
          if (typeof url !== "string" || !url) {
            return Promise.reject(new Error("invalid script url"));
          }
          return new Promise(function (resolve, reject) {
            var script = document.createElement("script");
            script.src = url;
            script.async = false;
            script.onload = function () {
              resolve(typeof gsap !== "undefined");
            };
            script.onerror = reject;
            document.head.appendChild(script);
          });
        }

        function loadGsap(index) {
          if (typeof index !== "number" || index < 0 || isNaN(index)) index = 0;
          if (typeof gsap !== "undefined") return Promise.resolve(true);
          if (index >= GSAP_CDNS.length) return Promise.resolve(false);
          return loadScript(GSAP_CDNS[index])
            .then(function (ok) {
              return ok ? true : loadGsap(index + 1);
            })
            .catch(function () {
              return loadGsap(index + 1);
            });
        }

        function runAnimation() {
          var WHITE = "#F5F5F2";
          var GOLD = "#C9A227";
          var BLUE_SPARK = "#4A7CFF";

          var stage = document.getElementById("stage");
          var canvas = document.getElementById("canvas");
          var ctx = canvas ? canvas.getContext("2d") : null;
          var leftGlove = document.getElementById("glove-left");
          var rightGlove = document.getElementById("glove-right");
          var logoOverlay = document.getElementById("logo-overlay");
          var enterBtn = document.getElementById("enter-btn");
          var bootError = document.getElementById("boot-error");

          var ASSETS = {
            gloveRightPng: "/intro/glove-right.png",
            gloveRightSvg: "/intro/glove-right.svg",
            gloveLeftPng: "/intro/glove-left.png",
            gloveLeftSvg: "/intro/glove-left.svg",
            logoPng: "/intro/logo-boxing-center.png",
            logoSvg: "/intro/logo-boxing-center.svg",
          };

          var width = 0;
          var height = 0;
          var impactX = 0;
          var impactY = 0;
          var particles = [];
          var canvasActive = false;
          var logoRevealStarted = false;
          var enterShown = false;
          var enterFallbackTimer = null;
          var rafId = null;

          var logoImg = document.getElementById("logo-img");

          function showBootError(message) {
            console.error("[intro]", message);
            if (!bootError) return;
            bootError.hidden = false;
            bootError.textContent = message;
          }

          function goToSite() {
            try {
              sessionStorage.setItem("bcp-intro-done", "1");
              localStorage.setItem("bcp-intro-done", "1");
              sessionStorage.setItem("bcp-entered", "1");
            } catch (e) {}
            window.location.href = "/";
          }

          function ensureAssetPath(path, fallback) {
            if (typeof path === "string" && path.length > 0 && path !== "undefined") {
              return path;
            }
            return fallback;
          }

          function setImgSrc(imgEl, path, fallback) {
            if (!imgEl) return;
            var safe = ensureAssetPath(path, ensureAssetPath(fallback, ASSETS.logoSvg));
            if (imgEl.getAttribute("src") !== safe) {
              imgEl.setAttribute("src", safe);
            }
          }

          function loadImage(imgEl, primary, fallback) {
            var wanted = ensureAssetPath(primary, fallback);
            var backup = ensureAssetPath(fallback, primary);
            return new Promise(function (resolve) {
              if (!imgEl) {
                resolve(wanted);
                return;
              }
              var settled = false;
              function finish(path) {
                if (settled) return;
                settled = true;
                var safe = ensureAssetPath(path, backup);
                setImgSrc(imgEl, safe, backup);
                resolve(safe);
              }
              imgEl.onload = function () {
                finish(imgEl.currentSrc || imgEl.src || wanted);
              };
              imgEl.onerror = function () {
                finish(backup);
              };
              setImgSrc(imgEl, wanted, backup);
              if (imgEl.complete && imgEl.naturalWidth > 0) {
                finish(imgEl.currentSrc || imgEl.src || wanted);
              }
              setTimeout(function () {
                finish(imgEl.currentSrc || imgEl.src || wanted);
              }, 4000);
            });
          }

          function processGloveImage(img) {
            try {
              var w = img.naturalWidth;
              var h = img.naturalHeight;
              if (!w || !h) return img.src;
              if (/\.svg($|\?)/i.test(img.src)) return img.src;

              var off = document.createElement("canvas");
              off.width = w;
              off.height = h;
              var offCtx = off.getContext("2d");
              if (!offCtx) return img.src;
              offCtx.drawImage(img, 0, 0);
              var data = offCtx.getImageData(0, 0, w, h);

              for (var i = 0; i < data.data.length; i += 4) {
                var r = data.data[i];
                var g = data.data[i + 1];
                var b = data.data[i + 2];
                var lum = (r + g + b) / 3;
                var sat = Math.max(r, g, b) - Math.min(r, g, b);

                if (lum < 22) {
                  data.data[i + 3] = 0;
                } else if (sat < 40 && lum < 100) {
                  data.data[i + 3] = 0;
                } else if (sat < 55 && lum < 55) {
                  data.data[i + 3] = Math.max(0, data.data[i + 3] - 180);
                }
              }

              offCtx.putImageData(data, 0, 0);
              return off.toDataURL("image/png");
            } catch (err) {
              console.warn("[intro] Traitement gant ignoré:", err);
              return img.src;
            }
          }

          function loadGlove(imgEl, pngPath, svgPath) {
            var png = ensureAssetPath(pngPath, svgPath);
            var svg = ensureAssetPath(svgPath, png);
            return loadImage(imgEl, png, svg).then(function () {
              if (!imgEl || !imgEl.naturalWidth) return;
              if (/\.svg($|\?)/i.test(imgEl.src)) return;
              try {
                var processed = processGloveImage(imgEl);
                setImgSrc(imgEl, processed, png);
              } catch (err) {
                console.warn("[intro] Gant non traité:", err);
              }
            });
          }

          if (!stage || !canvas || !ctx || !leftGlove || !rightGlove || !logoOverlay || !enterBtn) {
            showBootError("Éléments DOM manquants — rechargez la page.");
            return;
          }

          function computeMeetOffset() {
            var gloveW =
              (leftGlove && leftGlove.offsetWidth) ||
              (rightGlove && rightGlove.offsetWidth) ||
              Math.min(width * 0.82, 720);
            return Math.max(gloveW * 0.3, Math.min(width * 0.38, 340));
          }

          function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            var dpr = Math.min(window.devicePixelRatio || 1, 2);
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + "px";
            canvas.style.height = height + "px";
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            impactX = width / 2;
            impactY = height / 2;
          }

          function spawnSparks(count) {
            for (var i = 0; i < count; i++) {
              var angle = Math.random() * Math.PI * 2;
              var speed = 5 + Math.random() * 14;
              particles.push({
                x: impactX + (Math.random() - 0.5) * 18,
                y: impactY + (Math.random() - 0.5) * 18,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                size: 1.5 + Math.random() * 3.5,
                color: Math.random() > 0.45 ? GOLD : Math.random() > 0.5 ? WHITE : BLUE_SPARK,
                alpha: 1,
              });
            }
          }

          function stopCanvas() {
            canvasActive = false;
            particles = [];
            if (ctx) ctx.clearRect(0, 0, width, height);
            canvas.style.display = "none";
            canvas.style.visibility = "hidden";
            canvas.style.pointerEvents = "none";
            if (rafId !== null) {
              cancelAnimationFrame(rafId);
              rafId = null;
            }
          }

          function drawSparks() {
            if (!canvasActive) return;
            ctx.clearRect(0, 0, width, height);
            for (var i = particles.length - 1; i >= 0; i--) {
              var p = particles[i];
              p.x += p.vx;
              p.y += p.vy;
              p.vy += 0.38;
              p.vx *= 0.97;
              p.alpha -= 0.035;
              if (p.alpha <= 0) {
                particles.splice(i, 1);
                continue;
              }
              ctx.save();
              ctx.globalAlpha = p.alpha;
              ctx.fillStyle = p.color;
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
              ctx.fill();
              ctx.restore();
            }
            rafId = requestAnimationFrame(drawSparks);
          }

          function clearEnterFallback() {
            if (enterFallbackTimer !== null) {
              clearTimeout(enterFallbackTimer);
              enterFallbackTimer = null;
            }
          }

          function scheduleEnterFallback(ms) {
            clearEnterFallback();
            enterFallbackTimer = window.setTimeout(function () {
              console.warn("[intro] Délai dépassé — affichage forcé du bouton.");
              stopCanvas();
              revealLogo();
              showEnterButton();
            }, ms);
          }

          function showEnterButton() {
            if (enterShown) return;
            enterShown = true;
            stage.classList.add("stage--ready");
            stopCanvas();
            enterBtn.classList.add("visible");
            enterBtn.style.pointerEvents = "auto";
            enterBtn.style.zIndex = "100";
            enterBtn.onclick = goToSite;
            clearEnterFallback();
          }

          function revealLogo() {
            if (logoRevealStarted) return;
            logoRevealStarted = true;
            stopCanvas();
            logoOverlay.style.visibility = "visible";
            logoOverlay.style.pointerEvents = "none";
            if (typeof gsap !== "undefined") {
              gsap.to(logoOverlay, {
                opacity: 1,
                duration: 0.9,
                ease: "power2.out",
                onComplete: showEnterButton,
              });
            } else {
              logoOverlay.style.transition = "opacity 0.9s ease-out";
              logoOverlay.style.opacity = "1";
              setTimeout(showEnterButton, 900);
            }
          }

          function afterImpact() {
            stopCanvas();
            setTimeout(revealLogo, 200);
          }

          function startTimelineFallback() {
            console.warn("[intro] GSAP indisponible — lecture via requestAnimationFrame.");
            var meetOffset = computeMeetOffset();
            var start = performance.now();
            var phase = "enter";

            leftGlove.style.visibility = "visible";
            rightGlove.style.visibility = "visible";
            leftGlove.style.transform =
              "translate(-50%, -50%) translate(" + -width * 0.75 + "px, 0) rotate(10deg) scale(1.12)";
            rightGlove.style.transform =
              "translate(-50%, -50%) translate(" + width * 0.75 + "px, 0) rotate(-10deg) scale(1.12)";

            function frame(now) {
              var t = (now - start) / 1000;

              if (phase === "enter") {
                var p = Math.min(1, Math.max(0, t / 0.85));
                var ease = p * p * p * p;
                var lx = -width * 0.75 + (-meetOffset - -width * 0.75) * ease;
                var rx = width * 0.75 + (meetOffset - width * 0.75) * ease;
                leftGlove.style.opacity = String(Math.min(1, p * 1.4));
                rightGlove.style.opacity = String(Math.min(1, p * 1.4));
                leftGlove.style.transform =
                  "translate(-50%, -50%) translate(" + lx + "px, 0) rotate(" + (10 + 4 * ease) + "deg) scale(" + (1.12 + 0.03 * ease) + ")";
                rightGlove.style.transform =
                  "translate(-50%, -50%) translate(" + rx + "px, 0) rotate(" + (-10 - 4 * ease) + "deg) scale(" + (1.12 + 0.03 * ease) + ")";
                if (p >= 1) {
                  phase = "shake";
                  canvasActive = true;
                  spawnSparks(140);
                  drawSparks();
                  window.__shakeStart = now;
                }
              } else if (phase === "shake") {
                var sp = Math.min(1, (now - window.__shakeStart) / 320);
                var shake = Math.sin(sp * Math.PI * 14) * (1 - sp) * 14;
                stage.style.transform = "translate(" + shake + "px, " + shake * 0.4 + "px)";
                if (sp >= 1) {
                  stage.style.transform = "";
                  phase = "fade";
                  window.__fadeStart = now;
                }
              } else if (phase === "fade") {
                var fp = Math.min(1, (now - window.__fadeStart) / 320);
                leftGlove.style.opacity = String(1 - fp);
                rightGlove.style.opacity = String(1 - fp);
                if (fp >= 1) {
                  afterImpact();
                  return;
                }
              }

              requestAnimationFrame(frame);
            }

            requestAnimationFrame(frame);
          }

          function startTimeline() {
            scheduleEnterFallback(5000);

            var meetOffset = computeMeetOffset();

            if (typeof gsap === "undefined") {
              startTimelineFallback();
              return;
            }

            try {
              gsap.set(stage, { x: 0, y: 0 });
              gsap.set(leftGlove, {
                xPercent: -50,
                yPercent: -50,
                x: -width * 0.75,
                y: 0,
                rotation: 10,
                scale: 1.12,
                opacity: 0,
                visibility: "hidden",
                transformOrigin: "82% 50%",
              });
              gsap.set(rightGlove, {
                xPercent: -50,
                yPercent: -50,
                x: width * 0.75,
                y: 0,
                rotation: -10,
                scale: 1.12,
                opacity: 0,
                visibility: "hidden",
                transformOrigin: "18% 50%",
              });
              gsap.set(logoOverlay, { opacity: 0, visibility: "hidden" });

              var RUSH_DURATION = 0.85;
              var tl = gsap.timeline({ delay: 0.2 });

              tl.set([leftGlove, rightGlove], { visibility: "visible", opacity: 1 })
                .to(leftGlove, {
                  x: -meetOffset,
                  y: 0,
                  rotation: 14,
                  scale: 1.15,
                  duration: RUSH_DURATION,
                  ease: "power4.in",
                })
                .to(
                  rightGlove,
                  {
                    x: meetOffset,
                    y: 0,
                    rotation: -14,
                    scale: 1.15,
                    duration: RUSH_DURATION,
                    ease: "power4.in",
                  },
                  "<",
                )
                .add(function () {
                  canvasActive = true;
                  spawnSparks(140);
                  drawSparks();
                }, "-=0.03")
                .to(
                  stage,
                  {
                    x: -14,
                    y: 6,
                    duration: 0.04,
                    yoyo: true,
                    repeat: 7,
                    ease: "power1.inOut",
                    onComplete: function () {
                      gsap.set(stage, { x: 0, y: 0 });
                    },
                  },
                  "<",
                )
                .to(leftGlove, { opacity: 0, scale: 1.28, duration: 0.32, ease: "power2.in" }, "-=0.1")
                .to(rightGlove, { opacity: 0, scale: 1.28, duration: 0.32, ease: "power2.in" }, "<")
                .add(afterImpact, "+=0.15");
            } catch (err) {
              console.error("[intro] Erreur GSAP:", err);
              startTimelineFallback();
            }
          }

          function boot() {
            try {
              resize();
              window.addEventListener("resize", resize);

              var assetsReady = Promise.all([
                loadGlove(leftGlove, ASSETS.gloveRightPng, ASSETS.gloveRightSvg),
                loadGlove(rightGlove, ASSETS.gloveLeftPng, ASSETS.gloveLeftSvg),
                loadImage(logoImg, ASSETS.logoPng, ASSETS.logoSvg),
              ]);

              var timelineReady = new Promise(function (resolve) {
                setTimeout(resolve, 2500);
              });

              Promise.race([assetsReady, timelineReady])
                .then(function () {
                  startTimeline();
                })
                .catch(function (err) {
                  console.error("[intro] Chargement assets:", err);
                  startTimeline();
                });
            } catch (err) {
              console.error("[intro] Boot échoué:", err);
              showBootError("Erreur au démarrage. Ouvrez la console (F12) pour le détail.");
              scheduleEnterFallback(5000);
              startTimelineFallback();
            }
          }

          boot();
        }

        window.addEventListener("error", function (event) {
          console.error("[intro] Erreur globale:", event.error || event.message);
        });

        function startApp() {
          loadGsap(0)
            .then(function (ok) {
              if (!ok) {
                console.warn("[intro] GSAP CDN inaccessible — repli RAF activé.");
              }
              runAnimation();
            })
            .catch(function (err) {
              console.error("[intro] Chargement GSAP:", err);
              runAnimation();
            });
        }

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", startApp);
        } else {
          startApp();
        }
      })();
    </script>
  </body>
</html>
